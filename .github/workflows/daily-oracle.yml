name: Daily Tech Oracle Sync

on:
  schedule:
    - cron: '0 6 * * *' # Every day at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  oracle-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Generate Intelligence Report
        run: python oracle.py

      - name: Commit and Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ README.md
          git commit -m "Oracle Update: Intelligence Distilled ($(date +'%Y-%m-%d'))" || exit 0
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git main

      - name: Notify via WhatsApp
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_REPORT=$(ls -t reports/*.md | head -n 1 | xargs basename)
          MESSAGE="🧠 *Tech Oracle Intelligence Unlocked*\nNew report available: *$LATEST_REPORT*"
          
          # Create notification file in the relay repo using GitHub API
          JSON_CONTENT=$(printf '{"message": "%s"}' "$MESSAGE")
          B64_CONTENT=$(echo -n "$JSON_CONTENT" | base64 -w 0)
          
          gh api --method PUT /repos/psycho237-prog/perpetual-node-relay/contents/notifications/notif-oracle-$(date +%s).json \
            -f message="WhatsApp Notify" \
            -f content="$B64_CONTENT"
